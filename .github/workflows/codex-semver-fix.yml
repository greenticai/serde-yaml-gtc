name: Codex Semver Fix
# Moved off pull_request onto a nightly schedule. See plans/binary-bifurcation.md
# Phase A.4. Manual runs remain available via workflow_dispatch.

on:
  schedule:
    # 04:29 UTC — staggered against nightly-semver-advisory callers (05:xx)
    # and against sibling codex callers across the Wave 1 repos.
    - cron: "22 3 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to scan and patch (only for manual run)"
        required: false
        default: ""
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semver-fix:
    uses: greenticai/.github/.github/workflows/codex-semver-fix.yml@main
    with:
      branch: ${{ github.event.inputs.branch || '' }}
    secrets: inherit
